<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cy30rt_AI - DeepSeek Style</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0f">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- LEFT SIDEBAR - Exactly Like DeepSeek -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button id="newChatBtn" class="new-chat-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    New Chat
                </button>
            </div>
            
            <div class="history-container">
                <div class="history-header">Recent Chats</div>
                <div class="history-list" id="historyList"></div>
            </div>
            
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="avatar">CY</div>
                    <div class="user-details">
                        <span class="user-name">Cy30rt_AI</span>
                        <span class="user-status">Active</span>
                    </div>
                </div>
            </div>
        </aside>
        
        <!-- MAIN CONTENT -->
        <main class="main">
            <!-- Top Bar - Minimal -->
            <header class="top-bar">
                <button id="mobileMenuBtn" class="mobile-menu-btn">☰</button>
                <div class="top-bar-right">
                    <button id="settingsBtn" class="top-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                    </button>
                    <button id="languageBtn" class="top-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 2a10 10 0 1 0 10 10 10 10 0 0 0-10-10zM2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        </svg>
                    </button>
                </div>
            </header>
            
            <!-- Chat Messages Area -->
            <div class="chat-area" id="chatArea">
                <div class="messages-container" id="messagesContainer"></div>
            </div>
            
            <!-- INPUT AREA - Exactly Like DeepSeek with STOP BUTTON -->
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="messageInput" rows="1" placeholder="Message Cy30rt_AI..."></textarea>
                    <div class="input-actions">
                        <button id="voiceBtn" class="voice-btn" title="Voice input">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
                            </svg>
                        </button>
                        <button id="stopBtn" class="stop-btn" title="Stop generation" style="display: none;">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="6" y="6" width="12" height="12" rx="1"/>
                            </svg>
                        </button>
                        <button id="sendBtn" class="send-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="input-note">
                    <span>Powered by Groq AI + Cerebras + Hausa Support | Type /help for commands</span>
                </div>
            </div>
            
            <!-- Typing Indicator -->
            <div id="typingIndicator" class="typing-indicator" style="display: none;">
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>
                <span>Cy30rt_AI is thinking</span>
            </div>
        </main>
    </div>
    
    <!-- Language Modal -->
    <div id="languageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Select Language</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body" id="languageModalGrid"></div>
        </div>
    </div>
    
    <!-- Settings Modal -->
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Voice Settings</h3>
                <button class="modal-close-settings">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-item">
                    <label>Auto-play responses</label>
                    <label class="toggle">
                        <input type="checkbox" id="autoPlayToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label>Voice readback</label>
                    <label class="toggle">
                        <input type="checkbox" id="voiceReadbackToggle">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <label>Speech speed</label>
                    <input type="range" id="voiceSpeed" min="0.5" max="2.0" step="0.05" value="1.0">
                    <span id="speedValue">Normal</span>
                </div>
                <div class="setting-item">
                    <label>Speech pitch</label>
                    <input type="range" id="voicePitch" min="0.5" max="2.0" step="0.05" value="1.0">
                    <span id="pitchValue">Normal</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="languages.js"></script>
    <script src="app.js"></script>
</body>
</html>
