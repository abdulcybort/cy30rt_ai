version: '3.8'

services:
  backend:
    build: ./backend
    container_name: cy30rt_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - APP_URL=${APP_URL}
    restart: unless-stopped

  telegram_bot:
    build: ./telegram_bot
    container_name: cy30rt_telegram
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - APP_URL=${APP_URL}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: cy30rt_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./miniapp:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    restart: unless-stopped
